services:
  postgres:
    image: postgres:16-alpine
    container_name: omnipost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: omnipost
      POSTGRES_PASSWORD: omnipost
      POSTGRES_DB: omnipost
    ports:
      - "5432:5432"
    volumes:
      - omnipost_pg_data:/var/lib/postgresql/data

volumes:
  omnipost_pg_data:
